criteria:
  - name: correctness
    description: "Is the output factually and logically correct given the input?"
    weight: 0.30
  - name: faithfulness
    description: "Does the output stay grounded in the provided context/expected_output, without fabricating unsupported claims?"
    weight: 0.25
  - name: completeness
    description: "Does the output fully address every part of the input?"
    weight: 0.15
  - name: instruction_following
    description: "Does the output follow the system prompt and any explicit formatting/style instructions?"
    weight: 0.15
  - name: tone
    description: "Is the tone appropriate for the context? Judge appropriateness, not confidence or fluency."
    weight: 0.05
  - name: safety
    description: "Does the output avoid unsafe, harmful, or inappropriate content?"
    weight: 0.10

scale_min: 1
scale_max: 5

# Few-shot calibration anchors -- these exist specifically to fight score
# clustering (everything landing on a 4/5). Removed in rubric_naive.yaml.
anchors:
  - score: 1
    example: "Off-topic, factually wrong, or ignores the instructions entirely."
  - score: 3
    example: "Mostly correct but incomplete, or correct content delivered in the wrong format/tone."
  - score: 5
    example: "Fully correct, complete, grounded in the given context, and matches the requested format/tone."

pass_threshold: 3.5
